---
- name: Setup K8s
  hosts: control-plane
  become: true
  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name: conntrack
        state: present
        update_cache: true

    - name: Create Kubernetes config directory
      ansible.builtin.file:
        path: /etc/kubernetes
        state: directory
        mode: "0755"

    - name: Create an Empty file for Kubeadm configuring
      ansible.builtin.copy:
        content: ""
        dest: /etc/kubernetes/kubeadm-config.yaml
        mode: "0600"
        force: false

    - name: Configure container runtime and control plane
      block:
        - name: Kubeadm config
          ansible.builtin.blockinfile:
            path: /etc/kubernetes/kubeadm-config.yaml
            block: |
              kind: ClusterConfiguration
              apiVersion: kubeadm.k8s.io/v1beta4
              networking:
                podSubnet: "{{ pod_cidr }}"
              controlPlaneEndpoint:  "{{ hostvars['cp1'].ansible_default_ipv4.address }}:6443"
              apiServer:
                certSANs:
                  - 127.0.0.1
                  - localhost
                  - {{ hostvars['cp1'].ansible_default_ipv4.address }}
              ---
              kind: KubeletConfiguration
              apiVersion: kubelet.config.k8s.io/v1beta1
              runtimeRequestTimeout: "15m"
              cgroupDriver: "systemd"
              systemReserved:
                cpu: 100m
                memory: 350M
              kubeReserved:
                cpu: 100m
                memory: 50M
              enforceNodeAllocatable:
              - pods
      rescue:
        - name: Fail with custom message
          ansible.builtin.fail:
            msg: "Failed to configure container runtime and control plane. Playbook will exit!"

    - name: Check if cluster is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: admin_conf_exists

    - name: Initialize the first control plane
      ansible.builtin.shell: kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --upload-certs >> cluster_initialized.log
      args:
        chdir: $HOME
      when: inventory_hostname == "cp1" and not admin_conf_exists.stat.exists

    - name: Start kubelet service
      ansible.builtin.service:
        name: kubelet
        state: started
        enabled: true

    - name: Wait for API server
      ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
      register: api_ready
      until: api_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false
      when: inventory_hostname == "cp1"

    - name: Grant cluster-admin to kubeadm admin group
      ansible.builtin.shell: |
        kubectl --kubeconfig /etc/kubernetes/super-admin.conf get clusterrolebinding kubeadm-cluster-admins || \
          kubectl --kubeconfig /etc/kubernetes/super-admin.conf create clusterrolebinding kubeadm-cluster-admins --clusterrole cluster-admin --group kubeadm:cluster-admins
      register: kubeadm_admin_binding
      changed_when: "'created' in kubeadm_admin_binding.stdout"
      when: inventory_hostname == "cp1"

    - name: Upload kubeadm cluster config
      ansible.builtin.command: kubeadm init phase upload-config kubeadm --config /etc/kubernetes/kubeadm-config.yaml --kubeconfig /etc/kubernetes/super-admin.conf
      register: kubeadm_upload_config
      changed_when: "'Storing the configuration' in kubeadm_upload_config.stdout"
      when: inventory_hostname == "cp1"

    - name: Upload kubelet cluster config
      ansible.builtin.command: kubeadm init phase upload-config kubelet --config /etc/kubernetes/kubeadm-config.yaml --kubeconfig /etc/kubernetes/super-admin.conf
      register: kubelet_upload_config
      changed_when: "'Creating a ConfigMap' in kubelet_upload_config.stdout"
      when: inventory_hostname == "cp1"

    - name: Configure bootstrap token discovery
      ansible.builtin.command: kubeadm init phase bootstrap-token --config /etc/kubernetes/kubeadm-config.yaml --kubeconfig /etc/kubernetes/super-admin.conf
      register: bootstrap_token_discovery
      changed_when: "'Creating the \"cluster-info\" ConfigMap' in bootstrap_token_discovery.stdout"
      when: inventory_hostname == "cp1"

    - name: Allow bootstrap tokens to read kubeadm config
      ansible.builtin.shell: |
        kubectl --kubeconfig /etc/kubernetes/super-admin.conf apply -f - <<'EOF'
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: kubeadm-config-reader
          namespace: kube-system
        rules:
          - apiGroups: [""]
            resources: ["configmaps"]
            resourceNames: ["kubeadm-config"]
            verbs: ["get"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: kubeadm-config-reader
          namespace: kube-system
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: kubeadm-config-reader
        subjects:
          - kind: Group
            name: system:bootstrappers:kubeadm:default-node-token
            apiGroup: rbac.authorization.k8s.io
        EOF
      register: kubeadm_config_reader
      changed_when: "'created' in kubeadm_config_reader.stdout or 'configured' in kubeadm_config_reader.stdout"
      when: inventory_hostname == "cp1"

    - name: Create .kube directory
      ansible.builtin.file:
        path: $HOME/.kube
        state: directory
        mode: "0755"

    - name: Copy admin.conf to User's kube config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: $HOME/.kube/config
        remote_src: true
        mode: "0600"
        owner: "{{ ansible_user }}"
      when: inventory_hostname == "cp1"

- name: Join Cluster
  hosts: cp1
  become: true
  tasks:
    - name: Get join command for control plane
      ansible.builtin.command: kubeadm token create --print-join-command --kubeconfig /etc/kubernetes/super-admin.conf
      register: join_command_control_plane

    - name: Get certificate key
      ansible.builtin.shell: kubeadm init phase upload-certs --upload-certs --kubeconfig /etc/kubernetes/super-admin.conf | tail -1
      register: cert_key

    - name: Set control plane join facts
      ansible.builtin.set_fact:
        control_plane_join_command: "{{ join_command_control_plane.stdout }}"
        certificate_key: "{{ cert_key.stdout }}"

- name: Join Cluster
  hosts: control-plane
  become: true
  tasks:
    - name: Stop kubelet service
      ansible.builtin.service:
        name: kubelet
        state: stopped
      when: inventory_hostname != "cp1"
      ignore_errors: true

    - name: Kill processes using kubernetes ports
      ansible.builtin.shell: |
        pkill -f kube-apiserver || true
        pkill -f kube-controller-manager || true
        pkill -f kube-scheduler || true
        pkill -f etcd || true
        sleep 3
      when: inventory_hostname != "cp1"
      ignore_errors: true

    - name: Clean up previous failed join attempts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/pki/ca.crt
        - /var/lib/kubelet
        - /etc/kubernetes/pki
        - /var/lib/etcd
        - /etc/kubernetes/manifests
      when: inventory_hostname != "cp1"
      ignore_errors: true

    - name: Join additional control plane nodes
      ansible.builtin.command: "{{ hostvars['cp1']['control_plane_join_command'] }} --control-plane --certificate-key {{ hostvars['cp1']['certificate_key']
        }}"
      when: inventory_hostname != "cp1"

    - name: Normalize CPU architecture for Cilium CLI
      ansible.builtin.set_fact:
        cilium_cli_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'arm64': 'arm64'}.get(ansible_architecture, ansible_architecture) }}"
      when: inventory_hostname == "cp1"

    - name: Check if Cilium CLI is installed
      ansible.builtin.command: which cilium
      register: cilium_cli_check
      changed_when: false
      failed_when: false
      when: inventory_hostname == "cp1"

    - name: Download Cilium CLI
      ansible.builtin.get_url:
        url: "https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
        dest: /tmp/cilium-cli.tar.gz
        mode: "0644"
      when: inventory_hostname == "cp1" and cilium_cli_check.rc != 0

    - name: Install Cilium CLI
      ansible.builtin.unarchive:
        src: /tmp/cilium-cli.tar.gz
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"
      when: inventory_hostname == "cp1" and cilium_cli_check.rc != 0

    - name: Install Cilium CNI
      ansible.builtin.command: >-
        cilium install
        --kubeconfig /etc/kubernetes/admin.conf
        --set kubeProxyReplacement=true
        --set k8sServiceHost={{ hostvars['cp1'].ansible_default_ipv4.address }}
        --set k8sServicePort=6443
        --set ipam.mode=cluster-pool
        --set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_cidr }}
      register: cilium_install
      changed_when: "'✅ Cilium was successfully installed' in cilium_install.stdout"
      when: inventory_hostname == "cp1"

    - name: Wait for Cilium DaemonSet rollout
      ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf rollout status daemonset/cilium -n kube-system --timeout=10m
      changed_when: false
      when: inventory_hostname == "cp1"

    - name: Wait for Cilium operator rollout
      ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf rollout status deployment/cilium-operator -n kube-system --timeout=10m
      changed_when: false
      when: inventory_hostname == "cp1"

    - name: Wait for nodes to be ready
      ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf wait --for=condition=Ready nodes --all --timeout=5m
      changed_when: false
      when: inventory_hostname == "cp1"

- hosts: cp1
  become: true
  tasks:
    - name: Get worker join command
      ansible.builtin.command: kubeadm token create --print-join-command --kubeconfig /etc/kubernetes/super-admin.conf
      register: worker_join_command

    - name: Save join command to a variable
      ansible.builtin.set_fact:
        worker_join_command: "{{ worker_join_command.stdout }}"

- hosts: worker
  become: true
  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name: conntrack
        state: present
        update_cache: true

    - name: Stop kubelet service
      ansible.builtin.service:
        name: kubelet
        state: stopped
      ignore_errors: true

    - name: Kill processes using kubernetes ports
      ansible.builtin.shell: |
        pkill -x kubelet || true
        sleep 2
      ignore_errors: true

    - name: Clean up previous failed join attempts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/pki/ca.crt
        - /var/lib/kubelet
        - /etc/kubernetes/pki
      ignore_errors: true

    - name: Get node status from cluster
      ansible.builtin.shell: |
        kubectl get node {{ inventory_hostname }} --no-headers 2>/dev/null || echo "NotFound"
      register: node_status
      delegate_to: cp1
      ignore_errors: true

    - name: Delete existing node from cluster
      ansible.builtin.shell: |
        kubectl delete node {{ inventory_hostname }} --ignore-not-found=true
      delegate_to: cp1
      when: node_status.stdout != "NotFound"

    - name: Join worker nodes
      ansible.builtin.command: "{{ hostvars['cp1']['worker_join_command'] }}"
