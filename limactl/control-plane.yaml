vmType: vz
arch: aarch64

cpus: 4
memory: "6GiB"
disk: "60GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

mounts:
  - location: "~"
    writable: false

ssh:
  localPort: 60022

networks:
  - lima: user-v2

portForwards:
  - guestPort: 6443
    hostPort: 6444
  - guestPort: 80
    hostPort: 30000

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      apt-get update
      id -u k8s >/dev/null 2>&1 || useradd -m -s /bin/bash k8s
      usermod -aG sudo k8s
      echo 'k8s ALL=(ALL) NOPASSWD:ALL' >/etc/sudoers.d/99-k8s
      chmod 0440 /etc/sudoers.d/99-k8s
      
      mkdir /home/k8s/.ssh/ -p
      HOST_USER=jazziro # change me
      cat /Users/${HOST_USER}/.ssh/id_ed25519.pub > /home/k8s/.ssh/authorized_keys
      chown k8s:k8s /home/k8s/.ssh/authorized_keys
      chmod 600 /home/k8s/.ssh/authorized_keys