---
- name: Join control plane nodes to Kubernetes cluster
  hosts: new_control_plane
  become: yes
  vars:
    existing_control_plane_node: "k8s-control-plane-2"

  tasks:
    - name: Get certificate key from existing control plane
      delegate_to: "{{ existing_control_plane_node }}"
      become: yes
      shell: |
        kubeadm init phase upload-certs --upload-certs 2>/dev/null || kubeadm alpha certs certificate-key
      register: certificate_key
      changed_when: false

    - name: Get join command from existing control plane
      delegate_to: "{{ existing_control_plane_node }}"
      become: yes
      command: kubeadm token create --print-join-command
      register: join_command
      changed_when: false

    - name: Parse join command
      set_fact:
        join_cmd: "{{ join_command.stdout_lines[0] }}"
        cert_key: "{{ certificate_key.stdout_lines[-1] }}"

    - name: Show join command
      debug:
        msg: "{{ join_cmd }} --control-plane --certificate-key {{ cert_key }}"

    - name: Join control plane node to cluster
      command: "{{ join_cmd }} --control-plane --certificate-key {{ cert_key }}"
      register: join_result
      changed_when: "'This node has joined the cluster' in join_result.stdout"

    - name: Verify node joined successfully
      command: kubectl get nodes
      delegate_to: "{{ existing_control_plane_node }}"
      register: node_status
      until: "'{{ inventory_hostname }}' in node_status.stdout"
      retries: 10
      delay: 10
      changed_when: false

    - name: Show node status
      debug:
        var: node_status.stdout_lines
