- hosts: k8s-control-plane-1
  gather_facts: no 
  become: no
  vars:
    target_namespace: external-snapshotter
  tasks:

    - name: Deploy external-snapshotter
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: external-snapshotter
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/codesenju/kubelab.git
              path: kustomize/external-snapshotter/overlays/prod
              targetRevision: HEAD
              kustomize:
                patches:
                  - target:
                      kind: Deployment
                      name: snapshot-controller
                    patch: |-
                      - op: replace
                        path: /spec/template/spec/containers/0/image
                        value: harbor.jazziro.com/registry-k8s-io/sig-storage/snapshot-controller:v8.4.0
                      - op: add
                        path: /spec/template/spec/imagePullSecrets
                        value:
                          - name: harbor-secret
                  - target:
                      kind: Deployment
                      name: snapshot-controller
                    patch: |-
                      - op: replace
                        path: /spec/replicas
                        value: 1
            destination:
              server: https://kubernetes.default.svc
              namespace: external-snapshotter
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true
              - RespectIgnoreDifferences=true
            # ignoreDifferences:
            # - group: ""
            #   kind: PersistentVolumeClaim
            #   jsonPointers:
            #   - /status  # Ignore PVC status changes

    - name: Create Harbor pull secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: harbor-secret
            namespace: '{{ target_namespace }}'
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ {'auths': {'https://' + harbor_domain: {'username': harbor_username, 'password': harbor_password, 'auth': (harbor_username + ':' + harbor_password) | b64encode}}} | to_json | b64encode }}"
