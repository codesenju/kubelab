---
- name: Cloudbeaver Playbook
  hosts: k8s-control-plane-1
  gather_facts: false
  vars:
    target_namespace: cloudbeaver
  tasks:
    - name: Deploy cloudbeaver ArgoCD Application
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: cloudbeaver
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/codesenju/kubelab.git
              path: kustomize/cloudbeaver/overlays/prod
              targetRevision: main
              kustomize:
                patches:
                  - target:
                      group: apps
                      version: v1
                      kind: PersistentVolumeClaim
                      name: cloudbeaver-data
                    patch: |-
                      - op: add
                        path: /spec/storageClassName
                        value: nfs-csi
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ target_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - RespectIgnoreDifferences=true
      tags: cloudbeaver
      when: false

    - name: Deploy postgres
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubelab.io/v1beta1
          kind: PGCluster
          metadata:
            name: cloudbeaver
            namespace: "{{ target_namespace }}"
          spec:
            name: cloudbeaver
            # image: ghcr.io/cloudnative-pg/postgresql:16-minimal-trixie # db version must be compatiable with the backup db version
            db:
              name: cloudbeaver
              username: "{{ cloudbeaver_db_username }}"
              secretName: cloudbeaver-postgres-secrets
              # size: 1Gi
              storageClassName: nfs-csi-postgres
            bootstrap:
              mode: recovery
            recovery:
              backupID: "20260401T020006" # backup will be at s3Path/serverName/base/<backupID>
              serverName: "cloudbeaver-postgres" # backup files will be at s3Path/serverName/base
            restoreSource:
              s3Path: "s3://cnpg/backups"
              endpointURL: "https://{{ rustfs_endpoint }}"
              s3:
                credentialsSecretName: s3-creds
                accessKeyId: ACCESS_KEY_ID
                secretAccessKey: SECRET_ACCESS_KEY
            archiveDestination:
              s3Path: "s3://cnpg/backup2/"
              endpointURL: "https://{{ rustfs_endpoint }}"
              # retentionPolicy: "5d"
              s3:
                credentialsSecretName: s3-creds
                accessKeyId: ACCESS_KEY_ID
                secretAccessKey: SECRET_ACCESS_KEY
            scheduledBackup:
              enabled: true
              # cron: "0 0 2 * * *"
      tags:
        - postgres

    - name: Create cloudbeaver postgres secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudbeaver-postgres-secrets
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            username: "{{ cloudbeaver_db_username }}"
            password: "{{ cloudbeaver_db_password }}"
      tags:
        - postgres

    - name: Create postgres secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: s3-creds
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            ACCESS_KEY_ID: "{{ rustfs_access_key }}"
            SECRET_ACCESS_KEY: "{{ rustfs_secret_key }}"
      tags:
        - postgres

    - name: Deploy cloudbeaver
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: cloudbeaver
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/dbeaver/cloudbeaver-deploy.git
              path: k8s
              targetRevision: HEAD
              helm:
                values: |
                  cloudbeaver:
                    replicaCount: 1
                    image: harbor.jazziro.com/dockerio/dbeaver/cloudbeaver
                    imageTag: "26.0.0"
                    pullPolicy: IfNotPresent
                    pullCredsName: harbor-secret
                  cloudbeaverBaseDomain: "cloudbeaver.local.jazziro.com"
                  httpScheme: http
                  cloudProvider: None
                  storage:
                    storageClassName: "truenas-nfs-zstd"
                  backend:
                    internal_db: false
                    cloudbeaver_db_driver: postgres-jdbc
                    # The full JDBC URL:
                    cloudbeaver_db_url: jdbc:postgresql://cloudbeaver-postgres-rw.cloudbeaver.svc.cluster.local:5432/cloudbeaver
                    cloudbeaver_db_user: cloudbeaver
                    cloudbeaver_db_password: "{{ cloudbeaver_db_password }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ target_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - RespectIgnoreDifferences=true
      tags:
        - cloudbeaver

    - name: Create Harbor pull secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: harbor-secret
            namespace: "{{ target_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ {'auths': {'https://' + harbor_domain: {'username': harbor_username, 'password': harbor_password, 'auth': (harbor_username + ':'
              + harbor_password) | b64encode}}} | to_json | b64encode }}"

    - name: Create HTTPRoute
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: cloudbeaver
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: gateway-infra
                sectionName: websecure
            hostnames:
              - "cloudbeaver.{{ local_dns }}"
            rules:
              - backendRefs:
                  - name: cloudbeaver
                    port: 8978
      tags:
        - ingress

    - name: Create HTTPRoute http redirect
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: cloudbeaver-redirect
            namespace: cloudbeaver
          spec:
            parentRefs:
              - name: local-gateway
                namespace: gateway-infra
                sectionName: web
            hostnames:
              - "cloudbeaver.{{ local_dns }}"
            rules:
              - filters:
                  - type: RequestRedirect
                    requestRedirect:
                      scheme: https
                      statusCode: 301
                      port: 443
      tags:
        - ingress
