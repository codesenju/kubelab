---
- name: Npm Playbook
  hosts: k8s-control-plane-1
  gather_facts: false
  become: false
  vars:
    target_namespace: instagram-reels-downloader
  tasks:
    - name: Deploy instagram-reels-downloader
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: instagram-reels-downloader
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/codesenju/kubelab.git
              path: kustomize/instagram-reels-downloader/overlays/prod
              targetRevision: main
              kustomize:
                commonLabels:
                  app.kubernetes.io/instance: instagram-reels-downloader
            destination:
              server: https://kubernetes.default.svc
              namespace: instagram-reels-downloader
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - RespectIgnoreDifferences=true
