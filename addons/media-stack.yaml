---
- name: Media Stack Playbook
  hosts: k8s-control-plane-1
  gather_facts: false
  become: false
  vars:
    target_namespace: media-stack
  tasks:
    - name: Deploy Media Stack
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: media-stack
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/codesenju/kubelab.git
              path: kustomize/media-stack/overlays/production
              targetRevision: main
              kustomize:
                # Add these to your existing kustomize config
                commonAnnotations:
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                commonLabels:
                  app.kubernetes.io/instance: media-stack-prod
                patches:
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: lidarr
                    patch: |-
                      - op: replace
                        path: /spec/replicas
                        value: 0
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: jackett
                    patch: |-
                      - op: replace
                        path: /spec/replicas
                        value: 0
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                    patch: |-
                      - op: add
                        path: /spec/template/spec/priorityClassName
                        value: high-priority
                  - target:
                      group: apps
                      version: v1
                      kind: StatefulSet
                    patch: |-
                      - op: add
                        path: /spec/template/spec/priorityClassName
                        value: high-priority
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                    patch: |-
                      - op: add
                        path: /spec/template/spec/imagePullSecrets
                        value:
                          - name: nexus-registry-creds
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: prowlarr
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ prowlarr_image }}
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: radarr
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ radarr_image }}
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: sonarr
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ sonarr_image }}
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: tdarr
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ tdarr_image }}
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: tdarr-worker
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ tdarr_node_image }}
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: flaresolverr
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ flaresolverr_image }}
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: jellyseerr
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ jellyseerr_image }}
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: jellyfin
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: {{ jellyfin_image }}
            destination:
              server: https://kubernetes.default.svc
              namespace: media-stack

            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - RespectIgnoreDifferences=true

      # ignoreDifferences:
      # - group: ""
      #   kind: PersistentVolumeClaim
      #   jsonPointers:
      #   - /status  # Ignore PVC status changes
      tags:
        - media-stack
        - argocd

    - name: Create HTTPRoute flaresolverr
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: flaresolverr
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
            hostnames:
              - "flaresolverr.{{ local_dns }}"
            rules:
              - backendRefs:
                  - name: flaresolverr
                    port: 8191
      tags:
        - ingress
        - httproute

    - name: Create HTTPRoute lidarr
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: lidarr
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
            hostnames:
              - "lidarr.{{ local_dns }}"
            rules:
              - backendRefs:
                  - name: lidarr
                    port: 8686
      tags:
        - ingress
        - httproute
      when: false

    - name: Create HTTPRoute prowlarr
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: prowlarr
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
            hostnames:
              - "prowlarr.{{ local_dns }}"
            rules:
              - backendRefs:
                  - name: prowlarr
                    port: 9696
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: crowdsec-bouncer
      tags:
        - ingress
        - httproute

    - name: Create HTTPRoute tdarr
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: tdarr
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
            hostnames:
              - "tdarr.{{ local_dns }}"
            rules:
              - backendRefs:
                  - name: tdarr
                    port: 8265
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: crowdsec-bouncer
      tags:
        - ingress
        - httproute

    - name: Create HTTPRoute jellyseerr
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: jellyseerr
            namespace: "{{ target_namespace }}"
            # annotations:
            #   external-dns.alpha.kubernetes.io/target: "{{ traefik_service_ip }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
                sectionName: websecure

              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
                sectionName: websecure-pvt

            hostnames:
              - "catalog.{{ public_dns }}"
              - "catalog.{{ local_dns }}"

            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: crowdsec-bouncer
                backendRefs:
                  - name: jellyseerr
                    port: 5055
      tags:
        - ingress
        - httproute


    - name: Create HTTPRoute jellyfin
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: jellyfin
            namespace: "{{ target_namespace }}"
            # annotations:
            #   external-dns.alpha.kubernetes.io/target: "{{ traefik_service_ip }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
                sectionName: websecure

              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
                sectionName: websecure-pvt

            hostnames:
              - "stream.{{ public_dns }}"
              - "stream.{{ local_dns }}"

            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: crowdsec-bouncer
                backendRefs:
                  - name: jellyfin
                    port: 8096
      tags:
        - ingress
        - httproute

    - name: Create HTTPRoute sonarr
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: sonarr
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
            hostnames:
              - "sonarr.{{ local_dns }}"
            rules:
              - backendRefs:
                  - name: sonarr
                    port: 8989
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: crowdsec-bouncer
      tags:
        - ingress

    - name: Create HTTPRoute radarr
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: radarr
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
            hostnames:
              - "radarr.{{ local_dns }}"
            rules:
              - backendRefs:
                  - name: radarr
                    port: 7878
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: crowdsec-bouncer
      tags:
        - ingress
