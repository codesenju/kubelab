---
- name: Headplane Playbook
  hosts: k8s-control-plane-1
  gather_facts: false
  become: false
  vars:
    target_namespace: headscale
  tasks:
    - name: Create Headplane ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: headplane-config
            namespace: "{{ target_namespace }}"
          data:
            config.yaml: "{{ lookup('ansible.builtin.template', playbook_dir + '/headplane-config.yaml.j2') }}"
      tags:
        - headplane

    - name: Deploy Headplane ArgoCD Application
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: headplane
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/codesenju/kubelab.git
              path: kustomize/headplane/overlays/prod
              targetRevision: main
              kustomize:
                commonAnnotations:
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                commonLabels:
                  app.kubernetes.io/instance: headplane-prod
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ target_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - RespectIgnoreDifferences=true
      tags:
        - headplane

    - name: Create Headplane HTTPRoute
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: headplane
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
                sectionName: websecure
            hostnames:
              - "headplane.{{ public_dns }}"
            rules:
              - backendRefs:
                  - name: headplane
                    port: 3000
      tags:
        - ingress

    - name: Create Headplane HTTP to HTTPS redirect
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: headplane-redirect
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: "{{ gatewayapi_namespace }}"
                sectionName: web
            hostnames:
              - "headplane.{{ public_dns }}"
            rules:
              - filters:
                  - type: RequestRedirect
                    requestRedirect:
                      scheme: https
                      statusCode: 301
                      port: 443
      tags:
        - ingress
