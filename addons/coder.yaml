---
- name: Coder Playbook
  hosts: k8s-control-plane-1
  become: false
  gather_facts: false
  vars:
    target_namespace: coder
  tasks:
    - name: Create coder postgres secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: coder-postgres-secrets
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            username: "{{ coder_db_username }}"
            password: "{{ coder_db_password }}"

    - name: Create coder postgres secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: s3-creds
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            ACCESS_KEY_ID: "{{ rustfs_access_key }}"
            SECRET_ACCESS_KEY: "{{ rustfs_secret_key }}"

    - name: Create s3 secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: s3-creds
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            username: "{{ coder_db_username }}"
            password: "{{ coder_db_password }}"

    - name: Deploy coder postgres cluster
      kubernetes.core.k8s:
        state: present
        definition:

    - name: Create coder db url
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: coder-config
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            url: "{{ coder_db_url }}"
            coder_access_url: "https://coder.{{ local_dns }}"

    - name: Deploy Coder
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: coder
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              chart: coder
              repoURL: https://helm.coder.com/v2
              targetRevision: 2.31.5
              helm:
                releaseName: coder
                values: |
                  coder:
                    env:
                      - name: CODER_PG_CONNECTION_URL
                        valueFrom:
                          secretKeyRef:
                            name: coder-config
                            key: url
                      - name: CODER_ACCESS_URL
                        valueFrom:
                          secretKeyRef:
                            name: coder-config
                            key: coder_access_url
                      - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
                        value: "false"
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ target_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true

    - name: Create coder HTTPRoute
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: coder
            namespace: "{{ target_namespace }}"
          spec:
            hostnames:
              - "coder.{{ local_dns }}"
            parentRefs:
              - name: local-gateway
                namespace: gateway-infra
                sectionName: websecure
            rules:
              - backendRefs:
                  - name: coder
                    port: 80
