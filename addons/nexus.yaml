---
- name: Nexus Playbook
  hosts: k8s-control-plane-1
  gather_facts: false
  vars:
    target_namespace: nexus
  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ target_namespace }}"

    - name: Create nexus postgres secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: nexus-postgres-secrets
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            username: "{{ nexus_db_username }}"
            password: "{{ nexus_db_password }}"
      tags:
        - postgres

    - name: Create postgres secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: s3-creds
            namespace: "{{ target_namespace }}"
          type: Opaque
          stringData:
            ACCESS_KEY_ID: "{{ rustfs_access_key }}"
            SECRET_ACCESS_KEY: "{{ rustfs_secret_key }}"
      tags:
        - postgres

    - name: Deploy postgres
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1beta1
          kind: PostgresCluster # Use PostgresCluster instead if you don't want to create cluster from backup and remove backupPlan
          metadata:
            name: nexus
            namespace: "{{ target_namespace }}"
          spec:
            name: nexus
            image: ghcr.io/tensorchord/cloudnative-pgvecto.rs:16.5-v0.3.0
            db:
              name: nexus
              username: nexus
              secretName: nexus-postgres-secrets
              storageClassName: "nfs-csi-postgres"
              # backupName: nexus-postgres-daily-s3-backup-20260402020000 # remove me if not creating cluster from backup
            backup:
              s3Path: "s3://cnpg/backups"
              endpointURL: "https://{{ rustfs_endpoint }}"
              retentionPolicy: "5d"
              s3:
                credentialsSecretName: s3-creds
                accessKeyId: ACCESS_KEY_ID
                secretAccessKey: SECRET_ACCESS_KEY
            scheduledBackup:
              enabled: true
      tags:
        - postgres

    - name: Deploy nexus
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: nexus
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/codesenju/kubelab.git
              path: kustomize/nexus/overlays/prod
              targetRevision: main
              kustomize:
                # Add these to your existing kustomize config
                labels:
                  app.kubernetes.io/instance: nexus
                patches:
                  - target:
                      group: gateway.networking.k8s.io
                      version: v1
                      kind: HTTPRoute
                      name: nexus-repo
                    patch: |-
                      - op: replace
                        path: /spec/hostnames
                        value:
                          - "nexus.{{ local_dns }}"
                          - "registry.{{ local_dns }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ target_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - RespectIgnoreDifferences=true
            ignoreDifferences:
              - group: "gateway.networking.k8s.io"
                kind: HTTPRoute
                name: nexus-repo
                jqPathExpressions:
                  - .spec.parentRefs[]
                  - .spec.rules[]
