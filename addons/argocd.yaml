---
- name: Argocd Playbook
  hosts: k8s-control-plane-1
  become: false
  gather_facts: false
  vars:
    target_namespace: argocd
  tasks:
    # kubectl get crd -o name | grep argoproj.io | xargs kubectl delete
    - name: Deploy Argocd
      kubernetes.core.helm:
        name: argocd
        state: present
        chart_repo_url: https://argoproj.github.io/argo-helm
        chart_ref: argo-cd
        chart_version: 9.4.14
        release_namespace: "{{ target_namespace }}"
        create_namespace: true
        release_values:
          global:
            domain: "{{ argocd_domain }}"
          controller:
            replicas: "{{ argocd_replicas.controller }}"
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                cpu: 500m
                memory: 1Gi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: false
          server:
            replicas: "{{ argocd_replicas.server }}"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: false
          repoServer:
            replicas: "{{ argocd_replicas.repo_server }}"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: false
          applicationSet:
            replicas: "{{ argocd_replicas.application_set }}"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: false
          configs:
            # secret:
            #   extra:
            #     dex.authentik.clientSecret: "{{ argocd_openid_client_secret }}"
            rbac:
              policy.csv: |
                g, ArgoCD Admins, role:admin
                g, authentik Admins, role:admin
                g, ArgoCD Viewers, role:readonly
                g, kubelab17:kubelab, role:readonly
            cm:
              accounts.devops: apiKey, login
              accounts.devops.enabled: "true"
              admin.enabled: false
              exec.enabled: true
              dex.config: |
                connectors:
                # https://github.com/dexidp/website/blob/main/content/docs/connectors/github.md
                - type: github
                  id: github
                  name: GitHub
                  config:
                    clientID: "{{ github_client_id }}"
                    clientSecret: "{{ github_client_secret }}"
                    orgs:
                    - name: kubelab17
                      teams:
                      - kubelab
                # Authentik OIDC connector configuration
                - type: oidc
                  name: authentik
                  id: authentik
                  config:
                    issuer: "{{ argocd_openid_issuer_url }}"
                    redirectURI: "{{ argocd_openid_redirect_uri }}"
                    clientID: argocd
                    clientSecret: "{{ argocd_openid_client_secret }}"
                    insecureEnableGroups: true
                    scopes:
                      - openid
                      - profile
                      - email
            params:
              server.insecure: true
          redis-ha:
            enabled: false
          redis:
            resources:
              requests:
                cpu: 25m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
          dex:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
          notifications:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 256Mi
            # extraArgs:
            #   - --disable-tls
      tags:
        - argocd

    - name: Create HTTPRoute
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: argocd-server
            namespace: "{{ target_namespace }}"
          spec:
            parentRefs:
              - name: local-gateway
                namespace: gateway-infra
            hostnames:
              - "argocd.{{ public_dns }}"
            rules:
              - backendRefs:
                  - name: argocd-server
                    port: 80
      tags:
        - ingress

    - name: Get Argo CD admin password
      ansible.builtin.shell: set -o pipefail; kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false
      tags:
        - get_credentials

    - name: Get LoadBalancer IP
      ansible.builtin.shell: kubectl -n argocd get svc argocd-server -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: lb_ip
      changed_when: false
      tags:
        - get_credentials

    - name: Create local wildcar certificate
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: local-jazziro-com-tls
            namespace: "{{ target_namespace }}"
          spec:
            secretName: local-jazziro-com-tls
            issuerRef:
              name: letsencrypt-production
              kind: ClusterIssuer
            commonName: "{{ local_dns_wildcard }}"
            dnsNames:
              - "{{ local_dns_wildcard }}"
      tags:
        - ingress
        - certificate
      when: false

    - name: Create Traefik dashboard IngressRoute
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: argocd-server
            namespace: "{{ target_namespace }}"
            annotations:
              kubernetes.io/ingress.class: traefik
              external-dns.alpha.kubernetes.io/target: "{{ traefik_service_ip }}"
          spec:
            entryPoints:
              - websecure
            routes:
              - match: Host(`argocd.{{ local_dns }}`)
                kind: Rule
                services:
                  - name: argocd-server
                    kind: Service
                    port: 80
            tls:
              secretName: local-jazziro-com-tls
      tags:
        - ingress
      when: false

    - name: Create ServiceMonitor for ArgoCD Application Controller
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: argocd-metrics
            namespace: "{{ target_namespace }}"
            labels:
              release: kube-prometheus-stack
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: argocd-metrics
            endpoints:
              - port: http-metrics

    - name: Create ServiceMonitor for ArgoCD Server
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: argocd-server-metrics
            namespace: "{{ target_namespace }}"
            labels:
              release: kube-prometheus-stack
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: argocd-server-metrics
            endpoints:
              - port: http-metrics

    - name: Create ServiceMonitor for ArgoCD Repo Server
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: argocd-repo-server-metrics
            namespace: "{{ target_namespace }}"
            labels:
              release: kube-prometheus-stack
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: argocd-repo-server
            endpoints:
              - port: http-metrics

    - name: Create ServiceMonitor for ArgoCD ApplicationSet Controller
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: argocd-applicationset-controller-metrics
            namespace: "{{ target_namespace }}"
            labels:
              release: kube-prometheus-stack
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: argocd-applicationset-controller
            endpoints:
              - port: http-metrics

    - name: Display Argo CD access information
      ansible.builtin.debug:
        msg:
          - "----------------------------------------"
          - "🚀 Argo CD deployed successfully!"
          - "----------------------------------------"
          - "📍 URL:       http://{{ lb_ip.stdout }}"
          - "👤 Username:  admin"
          - "🔑 Password:  {{ argocd_password.stdout }}"
          - "----------------------------------------"
      tags:
        - get_credentials
