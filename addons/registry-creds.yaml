---
- name: Registry Creds Playbook
  hosts: k8s-control-plane-1
  gather_facts: false
  become: false
  vars:
    target_namespace: registry-creds
  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ target_namespace }}"

    - name: Deploy registry-creds ArgoCD Application
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: registry-creds
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/codesenju/kubelab.git
              path: kustomize/registry-creds/overlays/prod
              targetRevision: main
              kustomize:
                patches:
                  - target:
                      group: apps
                      version: v1
                      kind: Deployment
                      name: registry-creds-registry-creds-controller
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/image
                        value: ghcr.io/alexellis/registry-creds:0.3.2
                        # value: registry.local.example.com/ghcrio/alexellis/registry-creds:0.3.2
                      - op: add
                        path: /spec/template/spec/imagePullSecrets
                        value:
                          - name: registry-secret
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ target_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - RespectIgnoreDifferences=true

    - name: Create Container Registry pull secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: registry-secret
            namespace: "{{ target_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ {'auths': {'https://' + registry_domain: {'username': registry_username, 'password': registry_password,
                               'auth': (registry_username + ':' + registry_password) | b64encode}}} | to_json | b64encode }}"

    - name: Create Container Registry pull secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: ops.alexellis.io/v1
          kind: ClusterPullSecret
          metadata:
            name: registry-secret
          spec:
            secretRef:
              name: registry-secret
              namespace: "{{ target_namespace }}"
