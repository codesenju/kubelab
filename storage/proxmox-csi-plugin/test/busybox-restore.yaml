---
apiVersion: v1
kind: Pod
metadata:
  name: busybox-restore-pod
  namespace: test
spec:
  containers:
    - name: busybox
      image: busybox:latest
      command:
        - /bin/sh
        - -c
        - while true; do echo running && sleep 4; done
      volumeMounts:
        - name: volume
          mountPath: /mnt
  volumes:
    - name: volume
      persistentVolumeClaim:
        claimName: busybox-pvc
  restartPolicy: Never
