---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: busybox-restore-$(date +%Y-%m-%d_%Hh%M)
  namespace: test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: proxmox-csi
  resources:
    requests:
      storage: 1Gi
  dataSource:
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
    name: busybox-pvc-snapshot-$(date +%Y%m%d-%H%M%S)
