---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      # initContainers:
      #   - name: fix-docker-sock
      #     image: busybox
      #     command: ["sh", "-c", "if [ -d /var/run/docker.sock ]; then rm -rf /var/run/docker.sock; fi"]
      #     volumeMounts:
      #       - name: docker-sock
      #         mountPath: /var/run
      containers:
        - name: gitea-act-runner
          image: docker.io/gitea/act_runner:nightly
          env:
            - name: CONFIG_FILE
              value: /config/config.yaml
            - name: GITEA_INSTANCE_URL
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-secret
                  key: instance_url
            - name: GITEA_RUNNER_NAME
              value: "static-runner"
            - name: GITEA_RUNNER_LABELS
              value: "static,linux,k8s,x86_64"
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-secret
                  key: registration_token
          volumeMounts:
            - name: runner-config
              mountPath: /config
            - name: runner-data
              mountPath: /data
            # - name: dind-sock
            #   mountPath: /var/run/docker.sock
        - name: dind
          image: docker:24-dind
          securityContext:
            privileged: true
          args: ["--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
          # env:
          # - name: DOCKER_TLS_CERTDIR
          #   value: ""
          # volumeMounts:
          #   - name: dind-sock
          #     mountPath: /var/run/docker.sock
      volumes:
        - name: runner-config
          configMap:
            name: gitea-runner-config
        - name: runner-data
          persistentVolumeClaim:
            claimName: gitea-runner-data
        - name: docker-graph-storage
          emptyDir: {}
        # - name: dind-sock
        #   emptyDir: {}
