apiVersion: apps/v1
kind: Deployment
metadata:
  name: zerobyte
  labels:
    app: zerobyte
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: zerobyte
  template:
    metadata:
      labels:
        app: zerobyte
    spec:
      containers:
        - name: zerobyte
          image: IMAGE_PLACEHOLDER
          env:
            - name: TZ
              valueFrom:
                secretKeyRef:
                  name: zerobyte-secrets
                  key: TZ
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: zerobyte-secrets
                  key: BASE_URL
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: zerobyte-secrets
                  key: APP_SECRET
          ports:
            - containerPort: 4096
              name: http
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: zerobyte-data
              mountPath: /var/lib/zerobyte
            - name: dev-fuse
              mountPath: /dev/fuse
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: zerobyte-data
          persistentVolumeClaim:
            claimName: zerobyte-pvc
        - name: dev-fuse
          hostPath:
            path: /dev/fuse
            type: CharDevice
