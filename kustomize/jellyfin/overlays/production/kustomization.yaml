apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base

namespace: jellyfin

# Set production-specific image tags
images:
- name: docker.io/jellyfin/jellyfin
  newTag: "2025032405"

# Production-specific configurations
configMapGenerator:
- literals:
  - JELLYFIN_PublishedServerUrl=https://jellyfin.yourdomain.com
  name: jellyfin-env
patches:
- path: patch.yaml
