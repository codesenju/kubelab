apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base

# Patch the base resources for production-specific settings
patchesStrategicMerge:
- patch.yaml

# Set production-specific image tags
images:
- name: docker.io/jellyfin/jellyfin
  newTag: "2025032405"  # Or pin to a specific version like "10.8.13"

# Production-specific configurations
configMapGenerator:
- name: jellyfin-env
  literals:
  - JELLYFIN_PublishedServerUrl=https://jellyfin.yourdomain.com