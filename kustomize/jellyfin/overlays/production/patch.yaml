apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  template:
    spec:
      containers:
      - name: jellyfin
        volumeMounts:
        - name: media
          mountPath: /media
        envFrom:
        - configMapRef:
            name: jellyfin-env
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 60
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /web/index.html
            port: 8096
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: media
        nfs:
          server: 192.168.0.15 # change me
          path: /mnt/pool1/jellyfin/media
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
spec:
  resources:
    requests:
      storage: 20Gi  # Increased from base for production
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache
spec:
  resources:
    requests:
      storage: 50Gi  # Increased from base for production
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media
spec:
  resources:
    requests:
      storage: 200Gi  # Increased from base for production
---
