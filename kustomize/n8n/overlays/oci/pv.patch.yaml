---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-data
  labels:
    service: n8n-data
spec:
  $patch: replace
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /opt/k8s-storage/n8n/data/
    type: Directory
