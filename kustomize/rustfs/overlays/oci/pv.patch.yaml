apiVersion: v1
kind: PersistentVolume
metadata:
  name: rustfs-data
  labels:
    service: rustfs-data
spec:
  $patch: replace
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 5Gi
  hostPath:
    path: /opt/k8s-storage/rustfs
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
