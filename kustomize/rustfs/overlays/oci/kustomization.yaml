apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rustfs

images:
- name: IMAGE_PLACEHOLDER
  newName: rustfs/rustfs
  newTag: 1.0.0-alpha.91

patches:
  - path: pv.patch.yaml
    target:
      group: ""
      version: v1
      kind: PersistentVolume
      name: rustfs-data

resources:
- ../../base
