apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared resources across all apps
resources:
- _shared/data-volume.yaml
- _shared/permissions-cm.yaml
- _shared/network-policy.yaml

# Core media services
- jellyfin/deployment.yaml
- jellyfin/service.yaml
- jellyfin/hpa.yaml

# Download stack with VPN
- qbittorrent/deployment.yaml
- qbittorrent/service.yaml

# *Arr applications
- sonarr/deployment.yaml
- sonarr/service.yaml
- radarr/deployment.yaml
- radarr/service.yaml
- lidarr/deployment.yaml
- lidarr/service.yaml
- readarr/deployment.yaml
- readarr/service.yaml
- prowlarr/deployment.yaml
- prowlarr/service.yaml

# Additional components
- overseerr/deployment.yaml
- overseerr/service.yaml
- tdarr/deployment.yaml
- tdarr/service.yaml

# Configuration and secrets
configMapGenerator:
- name: global-env
  behavior: merge
  literals:
    - TZ=America/New_York
    - UMASK=002

secretGenerator:
- name: vpn-credentials
  files:
    - qbittorrent/vpn/config.ovpn
    - qbittorrent/vpn/auth.txt

# Common labels for all resources
commonLabels:
  app.kubernetes.io/part-of: media-stack
  app.kubernetes.io/managed-by: kustomize

# Enable field management for kubectl
buildMetadata:
  managedByLabel: app.kubernetes.io/managed-by

# Components that need special vars
components:
- components/crd/  # If using custom resources