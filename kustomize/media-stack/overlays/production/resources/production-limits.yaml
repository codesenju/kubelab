apiVersion: v1
kind: LimitRange
metadata:
  name: jellyfin-resource-limits
  namespace: media  # Replace with your namespace
spec:
  limits:
  - type: Container
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "500m"
      memory: "512Mi"
    default:
      cpu: "2"
      memory: "4Gi"
    defaultRequest:
      cpu: "1"
      memory: "2Gi"
    maxLimitRequestRatio:
      cpu: "2"
      memory: "2"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: jellyfin-resource-quota
  namespace: media  # Replace with your namespace
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "10"