apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
spec:
  template:
    spec:
      containers:
      - name: sonarr
        env:
        - name: SONARR__INSTANCE_NAME
          value: "Sonarr-Prod"
        - name: QBITTORRENT__HOST
          value: "qbittorrent"
        - name: QBITTORRENT__PORT
          value: "8080"
        volumeMounts:
        - name: data
          mountPath: /data/media/tv
          subPath: media/tv
        - name: data
          mountPath: /data/downloads
          subPath: downloads