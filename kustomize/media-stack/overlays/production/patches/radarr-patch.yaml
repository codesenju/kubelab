apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
spec:
  template:
    spec:
      containers:
      - name: radarr
        env:
        - name: RADARR__INSTANCE_NAME
          value: "Radarr-Prod"
        - name: RADARR__INSTANCE_NAME
          value: "Radarr-Prod"
        - name: RADARR__DOWNLOADCLIENT__1__DOWNLOADDIR
          value: "/downloads"
        - name: RADARR__MEDIADIR
          value: "/data/media/movies"
        volumeMounts:
        - name: data
          mountPath: /data/media/movies
          subPath: movies
        - name: data
          mountPath: /data/downloads
          subPath: downloads
        resources:
          requests:
            cpu: "1"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.82