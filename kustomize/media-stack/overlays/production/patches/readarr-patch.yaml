apiVersion: apps/v1
kind: Deployment
metadata:
  name: readarr
spec:
  template:
    spec:
      containers:
      - name: readarr
        env:
        - name: READARR__INSTANCE_NAME
          value: "Readarr-Prod"
        - name: READARR__DOWNLOADCLIENT__1__DOWNLOADDIR
          value: "/data/downloads"
        - name: READARR__MEDIADIR
          value: "/data/books"
        volumeMounts:
        - name: data
          mountPath: /data/books
          subPath: books
        - name: data
          mountPath: /data/downloads
          subPath: downloads