apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  template:
    spec:
      containers:
      - name: qbittorrent
        env:
        - name: QBITTORRENT_CATEGORIES
          value: "movies=/data/downloads/torrents/movies,tv=/data/downloads/torrents/tv,music=/data/downloads/torrents/music,books=/data/downloads/torrents/books"
        - name: DOWNLOADS_LOCATION
          value: "/data/downloads"
        volumeMounts:
        - name: data
          mountPath: /data/downloads/torrents
          subPath: downloads/torrents
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.83