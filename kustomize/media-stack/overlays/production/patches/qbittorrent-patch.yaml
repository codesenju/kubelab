apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  template:
    spec:
      dnsConfig:
        nameservers:
          - "1.1.1.1"  # Cloudflare
          - "9.9.9.9"   # Quad9
        searches:
          - "local"
      dnsPolicy: "None"  # Required for custom dnsConfig

      containers:

      # qBittorrent container
      - name: qbittorrent
        env:
        - name: QBITTORRENT_CATEGORIES
          value: "movies=/downloads/torrents/movies,tv=/downloads/torrents/tv,music=/downloads/torrents/music,books=/downloads/torrents/books"
        - name: DOWNLOADS_LOCATION
          value: "/data/downloads"
        volumeMounts:
        - name: data
          mountPath: /downloads/torrents
          subPath: downloads/torrents

      # Gluetun VPN container
      - name: gluetun
        image: qmcgaw/gluetun
        securityContext:
          privileged: true  # Required for /dev/net/tun
          capabilities:
            add:
              - NET_ADMIN
              - SYS_MODULE  # For tun device creation
        env:
          - name: VPN_SERVICE_PROVIDER
            value: "nordvpn"
          - name: VPN_TYPE
            value: "openvpn"
          - name: OPENVPN_USER
            valueFrom:
              secretKeyRef:
                name: nordvpn-credentials
                key: OPENVPN_USER
          - name: OPENVPN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: nordvpn-credentials
                key: OPENVPN_PASSWORD
          - name: SERVER_COUNTRIES
            value: "Spain"  # Matches your es212.nordvpn.com server
          - name: OPENVPN_CIPHER
            value: "AES-256-CBC"
          - name: OPENVPN_AUTH
            value: "SHA512"
        volumeMounts:
          - name: gluetun-config
            mountPath: /gluetun
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      volumes:
      - name: gluetun-config
        persistentVolumeClaim:
          claimName: gluetun-config
