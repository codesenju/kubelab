      #       value: "on" # Required for torrent clients
      #     - name: DNS_UPDATE_PERIOD
      #       value: "24h"
      #     - name: VPN_SERVICE_PROVIDER
      #       value: "nordvpn"
      #     - name: VPN_TYPE
      #       value: "openvpn"
      #     - name: OPENVPN_USER
      #       valueFrom:
      #         secretKeyRef:
      #           name: nordvpn-credentials
      #           key: OPENVPN_USER
      #     - name: OPENVPN_PASSWORD
      #       valueFrom:
      #         secretKeyRef:
      #           name: nordvpn-credentials
      #           key: OPENVPN_PASSWORD
      #     - name: SERVER_COUNTRIES
      #       value: "South Africa" # change to location closest to you for faster downloads
      #     - name: OPENVPN_CIPHER
      #       value: "AES-256-CBC"
      #     - name: OPENVPN_AUTH
      #       value: "SHA512"
      #   volumeMounts:
      #     - name: media-stack-config
      #       mountPath: /gluetun
      #       subPath: gluetun/config
      #   resources:
      #     requests:
      #       cpu: "100m"
