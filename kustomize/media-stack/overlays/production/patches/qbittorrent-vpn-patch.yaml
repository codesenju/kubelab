apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  template:
    spec:
      # Security context for VPN
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      # Init container for VPN setup
      initContainers:
      - name: vpn-init
        image: dperson/openvpn-client:latest
        command: ["sh", "-c"]
        args:
          - |
            echo "Starting VPN connection..." &&
            openvpn --config /vpn/config/config.ovpn --auth-user-pass /vpn/config/auth.txt --daemon &&
            sleep 10 &&
            echo "Verifying VPN..." &&
            curl --retry 5 --retry-all-errors --retry-delay 5 ifconfig.me &&
            echo "VPN IP: $(curl -s ifconfig.me)" &&
            [ "$(curl -s ifconfig.me)" != "$(dig +short myip.opendns.com @resolver1.opendns.com)" ] ||
            (echo "VPN leak detected!" && exit 1)
        envFrom:
        - configMapRef:
            name: vpn-settings
        volumeMounts:
        - name: vpn-credentials
          mountPath: /vpn/config
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"

      # Main container modifications
      containers:
      - name: qbittorrent
        env:
        - name: VPN_ENABLED
          value: "true"
        - name: VPN_INPUT_PORT
          value: "6881"
        - name: VPN_OUTPUT_PORT
          value: "6881"
        - name: ENABLE_PRIVOXY
          value: "false"
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: vpn-credentials
          mountPath: /vpn/config
          readOnly: true
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - 'curl -sSf --connect-timeout 3 http://localhost:8080 >/dev/null && 
               [ "$(curl -s ifconfig.me)" != "$(dig +short myip.opendns.com @resolver1.opendns.com)" ]'
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5

      # Additional volumes
      volumes:
      - name: vpn-credentials
        secret:
          secretName: vpn-credentials
          defaultMode: 0400