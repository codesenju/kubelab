apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
spec:
  template:
    spec:
      containers:
      - name: prowlarr
        env:
        - name: PROWLARR__INSTANCE_NAME
          value: "Prowlarr-Prod"
        - name: PROWLARR__LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: prowlarr-config
              key: LogLevel
        volumeMounts:
        - name: config
          mountPath: /config/appsettings.json
          subPath: appsettings.json
        - name: config
          mountPath: /config/logconfig.xml
          subPath: logconfig.xml
      volumes:
      - name: config
        configMap:
          name: prowlarr-config
          items:
          - key: appsettings.json
            path: appsettings.json
          - key: logconfig.xml
            path: logconfig.xml