apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy-manager
  labels:
    app: nginx-proxy-manager
spec:
  selector:
    matchLabels:
      app: nginx-proxy-manager
  template:
    metadata:
      labels:
        app: nginx-proxy-manager
    spec:
      containers:
      - name: nginx-proxy-manager
        env:
        - name: TZ
          value: "Africa/Johannesburg"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy-manager
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.57