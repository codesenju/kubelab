apiVersion: v1
kind: PersistentVolume
metadata:
  name: npm-data
  labels:
    service: npm-data   # This matches the PVC selector
spec:
  capacity:
    storage: 1Gi
  nfs:
    server: 192.168.0.15 # change me
    path: /mnt/pool1/AppData/nginx-proxy-manager
  accessModes:
    - ReadWriteMany
  mountOptions:
    - noatime
    - nfsvers=4.2
