---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: npm-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      service: npm-data  # Add selector to match PV label
  storageClassName: "" # This prevents dynamic provisioning
