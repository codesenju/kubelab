# Authentik
services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - ./database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_DB: ${PG_DB:-authentik}
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "0.5" # Limit to half a CPU core
          memory: 512M # Limit to 512MB RAM
        reservations:
          cpus: "0.25" # Guaranteed minimum CPU
          memory: 256M # Guaranteed minimum RAM
  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep PONG
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - ./redis:/data
    deploy:
      resources:
        limits:
          cpus: "0.5" # Limit to half a CPU core
          memory: 512M # Limit to 512MB RAM
        reservations:
          cpus: "0.25" # Guaranteed minimum CPU
          memory: 256M # Guaranteed minimum RAM
  server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.2.3}
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - ./media:/media
      - ./custom-templates:/templates
    env_file:
      - .env
    ports:
      - ${COMPOSE_PORT_HTTP:-9000}:9000
      - ${COMPOSE_PORT_HTTPS:-9443}:9443
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5" # Limit to half a CPU core
          memory: 512M # Limit to 512MB RAM
        reservations:
          cpus: "0.25" # Guaranteed minimum CPU
          memory: 256M # Guaranteed minimum RAM
  worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.2.3}
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
    # `user: root` and the docker socket volume are optional.
    # See more for the docker socket integration here:
    # https://goauthentik.io/docs/outposts/integrations/docker
    # Removing `user: root` also prevents the worker from fixing the permissions
    # on the mounted folders, so when removing this make sure the folders have the correct UID/GID
    # (1000:1000 by default)
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./media:/media
      - ./certs:/certs
      - ./custom-templates:/templates
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5" # Limit to half a CPU core
          memory: 512M # Limit to 512MB RAM
        reservations:
          cpus: "0.25" # Guaranteed minimum CPU
          memory: 256M # Guaranteed minimum RAM
networks: {}

# Portainer
services:
  portainer-ce:
    ports:
      - 8000:8000
      - 10443:9443
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    image: portainer/portainer-ce:lts
    deploy:
      resources:
        limits:
          cpus: "0.5" # Limit to half a CPU core
          memory: 512M # Limit to 512MB RAM
        reservations:
          cpus: "0.25" # Guaranteed minimum CPU
          memory: 256M # Guaranteed minimum RAM
networks: {}

# MariaDB
services:
  mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.5
    container_name: mariadb
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/GMT-2
      - REMOTE_SQL=http://URL1/your.sql,https://URL2/your.sql #optional
    volumes:
      - ./config:/config
    ports:
      - 3306:3306
    restart: unless-stopped

# Cloudflared
services:
  cloudflared:
    image: cloudflare/cloudflared:2025.4.0
    env_file:
      - .env
    command: tunnel --no-autoupdate run --token $CLOUDFLARED_TOKEN
networks: {}


# Uptime Kuma
services:
  uptime-kuma:
    restart: always
    ports:
      - 3002:3001
    volumes:
      - ./app_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    container_name: uptime-kuma
    image: louislam/uptime-kuma:1
volumes:
  uptime-kuma:
    external: true
    name: uptime-kuma
networks:
  cloudbeaver_default:
    external: true

# Cloudbeaver
services:
  cloudbeaver:
    container_name: cloudbeaver
    tty: true
    stdin_open: true
    ports:
      - 8978:8978
    volumes:
      - ./workspace:/opt/cloudbeaver/workspace
    image: dbeaver/cloudbeaver:25.0.2
networks: {}

# Webtop
services:
  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-kde
    container_name: webtop
    security_opt:
      - seccomp:unconfined #optional
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/GMT-2
      # - SUBFOLDER=/ #optional
      - TITLE=Webtop #optional
    volumes:
      - ./config:/config
      # - /var/run/docker.sock:/var/run/docker.sock #optional
    ports:
      - 4000:3000
      - 4001:3001
    deploy:
      resources:
        limits:
          cpus: "1" # Limit CPU core
          memory: 4G # Limit RAM
        reservations:
          cpus: "0.5" # Guaranteed minimum CPU
          memory: 2G # Guaranteed minimum RAM
    # devices:
    #   - /dev/dri:/dev/dri #optional
    shm_size: 1gb #optional
    restart: unless-stopped
networks: {}