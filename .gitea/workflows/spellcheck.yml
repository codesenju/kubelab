name: Spellcheck Documentation

on:
  push:
    paths:
      - '**/**/*.md'
      - '**/*.md'
      - '*.md'
  pull_request:
    paths:
      - '**/**/*.md'
      - '**/*.md'
      - '*.md'

jobs:
  spellcheck:
    runs-on: static-runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install typos
        run: |
          curl -sSfL https://github.com/crate-ci/typos/releases/latest/download/typos-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv typos /usr/local/bin/

      - name: Run typos on Markdown files
        run: |
          find . -type f -name "*.md" -print0 | xargs -0 typos

      - name: Install codespell
        run: pip install codespell

      - name: Run codespell on Markdown files
        run: codespell --ignore-words-list="mke,teh" --skip="*.py,*.yml,*.yaml" .
