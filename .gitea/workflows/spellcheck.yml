name: Spellcheck Documentation

on:
  pull_request:
    types: [opened]
  
env:
  CLICOLOR: 1

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python venv and install codespell
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install codespell

      - name: Run codespell on Markdown files
        run: |
          . .venv/bin/activate
          codespell --version
          codespell --ignore-words-list="mke,teh" --skip="*.py,*.yml,*.yaml" .