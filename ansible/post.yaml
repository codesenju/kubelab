---
- hosts: workers
  become: true
  tasks:
    - name: Install required packages
      apt:
        name:
          - cifs-utils
          - open-iscsi
          - lsscsi
          - sg3-utils
          - multipath-tools
          - scsitools
          - libnfs-utils
          - nfs-common
        state: present
        update_cache: yes

    - name: Configure multipath.conf
      copy:
        dest: /etc/multipath.conf
        content: |
          defaults {
              user_friendly_names yes
              find_multipaths yes
          }
        mode: '0644'

    - name: Enable and start multipath-tools service
      systemd:
        name: multipath-tools.service
        enabled: yes
        state: restarted

    - name: Check multipath-tools status
      systemd:
        name: multipath-tools.service
      register: multipath_status

    - name: Enable and start open-iscsi service
      systemd:
        name: open-iscsi.service
        enabled: yes
        state: started

    - name: Check open-iscsi status
      systemd:
        name: open-iscsi.service
      register: iscsi_status

    - name: Display service statuses
      debug:
        msg: 
          - "Multipath Status: {{ multipath_status.status.ActiveState }}"
          - "iSCSI Status: {{ iscsi_status.status.ActiveState }}"

    # Optional: Add error handling
    - name: Verify services are running
      assert:
        that:
          - multipath_status.status.ActiveState == "active"
          - iscsi_status.status.ActiveState == "active"
        fail_msg: "One or more required services are not running"
        success_msg: "All required services are running"
