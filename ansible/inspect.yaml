apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: media-server
    app.kubernetes.io/managed-by: kustomize-v5.6.0
    app.kubernetes.io/part-of: media-stack
  name: jellyfin
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/component: media-server
        app.kubernetes.io/managed-by: kustomize-v5.6.0
        app.kubernetes.io/part-of: media-stack
    spec:
      containers:
      - env:
        - name: JELLYFIN_PublishedServerUrl
          valueFrom:
            configMapKeyRef:
              key: JELLYFIN_URL
              name: media-stack-env-5h55gh6694
        envFrom:
        - configMapRef:
            name: shared-permissions
        - configMapRef:
            name: global-env-7h6d4fgc77
        image: docker.io/jellyfin/jellyfin:latest
        imagePullPolicy: IfNotPresent
        name: jellyfin
        ports:
        - containerPort: 8096
          name: http
        - containerPort: 8920
          name: https
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 2Gi
        volumeMounts:
        - mountPath: /data/media/movies
          name: data
          subPath: movies
        - mountPath: /data/media/tv
          name: data
          subPath: tv
        - mountPath: /data/media/music
          name: data
          subPath: music
        - mountPath: /config
          name: config
        - mountPath: /cache
          name: cache
        - mountPath: /data/media
          name: data
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: media-data
      - name: config
        persistentVolumeClaim:
          claimName: jellyfin-config
      - name: cache
        persistentVolumeClaim:
          claimName: jellyfin-cache
---
