---
- hosts: control-plane
  become: true
  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name: conntrack
        state: present
        update_cache: true

    - name: Create an Empty file for Kubeadm configuring
      ansible.builtin.copy:
        content: ""
        dest: /etc/kubernetes/kubeadm-config.yaml
        force: false

    - name: Configure container runtime and control plane
      block:
        - ansible.builtin.blockinfile:
            path: /etc/kubernetes/kubeadm-config.yaml
            block: |
              kind: ClusterConfiguration
              apiVersion: kubeadm.k8s.io/v1beta4
              networking:
                podSubnet: "{{ pod_cidr }}"
              controlPlaneEndpoint: "{{ hostvars['nginx-server']['ansible_host'] }}:6443"
              ---
              kind: KubeletConfiguration
              apiVersion: kubelet.config.k8s.io/v1beta1
              runtimeRequestTimeout: "15m"
              cgroupDriver: "systemd"
              systemReserved:
                cpu: 100m
                memory: 350M
              kubeReserved:
                cpu: 100m
                memory: 50M
              enforceNodeAllocatable:
              - pods
      rescue:
        - name: Fail with custom message
          ansible.builtin.fail:
            msg: "Failed to configure container runtime and control plane. Playbook will exit!"

    - name: Check if cluster is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: admin_conf_exists

    - name: Initialize the first control plane
      ansible.builtin.shell: kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --upload-certs >> cluster_initialized.log
      args:
        chdir: $HOME
      when: inventory_hostname == "k8s-control-plane-1" and not admin_conf_exists.stat.exists

    - name: Create .kube directory
      ansible.builtin.file:
        path: $HOME/.kube
        state: directory
        mode: "0755"

    - name: Copy admin.conf to User's kube config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: $HOME/.kube/config
        remote_src: true
        owner: "{{ ansible_user }}"
      when: inventory_hostname == "k8s-control-plane-1"

- hosts: k8s-control-plane-1
  become: true
  tasks:
    - name: Get join command for control plane
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command_control_plane

    - name: Get certificate key
      ansible.builtin.shell: kubeadm init phase upload-certs --upload-certs | tail -1
      register: cert_key

    - name: Set control plane join facts
      ansible.builtin.set_fact:
        control_plane_join_command: "{{ join_command_control_plane.stdout }}"
        certificate_key: "{{ cert_key.stdout }}"

- hosts: control-plane
  become: true
  tasks:
    - name: Stop kubelet service
      ansible.builtin.service:
        name: kubelet
        state: stopped
      when: inventory_hostname != "k8s-control-plane-1"
      ignore_errors: true

    - name: Kill processes using kubernetes ports
      ansible.builtin.shell: |
        pkill -f kube-apiserver || true
        pkill -f kube-controller-manager || true
        pkill -f kube-scheduler || true
        pkill -f etcd || true
        sleep 3
      when: inventory_hostname != "k8s-control-plane-1"
      ignore_errors: true

    - name: Clean up previous failed join attempts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/pki/ca.crt
        - /var/lib/kubelet
        - /etc/kubernetes/pki
        - /var/lib/etcd
        - /etc/kubernetes/manifests
      when: inventory_hostname != "k8s-control-plane-1"
      ignore_errors: true

    - name: Join additional control plane nodes
      ansible.builtin.command: "{{ hostvars['k8s-control-plane-1']['control_plane_join_command'] }} --control-plane --certificate-key {{ hostvars['k8s-control-plane-1']['certificate_key']
        }}"
      when: inventory_hostname != "k8s-control-plane-1"

    - name: Install Pod Network
      ansible.builtin.shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml >> pod_network_setup.log
      args:
        chdir: $HOME
        creates: pod_network_setup.log
      when: inventory_hostname == "k8s-control-plane-1"

- hosts: k8s-control-plane-1
  become: true
  tasks:
    - name: Get worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: worker_join_command

    - name: Save join command to a variable
      ansible.builtin.set_fact:
        worker_join_command: "{{ worker_join_command.stdout }}"

- hosts: workers
  become: true
  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name: conntrack
        state: present
        update_cache: true

    - name: Stop kubelet service
      ansible.builtin.service:
        name: kubelet
        state: stopped
      ignore_errors: true

    - name: Kill processes using kubernetes ports
      ansible.builtin.shell: |
        pkill -f kubelet || true
        sleep 2
      ignore_errors: true

    - name: Clean up previous failed join attempts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/pki/ca.crt
        - /var/lib/kubelet
        - /etc/kubernetes/pki
      ignore_errors: true

    - name: Get node status from cluster
      ansible.builtin.shell: |
        kubectl get node {{ inventory_hostname }} --no-headers 2>/dev/null || echo "NotFound"
      register: node_status
      delegate_to: k8s-control-plane-1
      ignore_errors: true

    - name: Delete existing node from cluster
      ansible.builtin.shell: |
        kubectl delete node {{ inventory_hostname }} --ignore-not-found=true
      delegate_to: k8s-control-plane-1
      when: node_status.stdout != "NotFound"

    - name: Join worker nodes
      ansible.builtin.command: "{{ hostvars['k8s-control-plane-1']['worker_join_command'] }}"
