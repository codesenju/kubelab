---
- name: Install Cilium CLI and Cilium
  hosts: k8s-control-plane-1
  become: true
  vars:
    cilium_version: "0.19.1" # Explicitly set version instead of fetching
  tasks:
    - name: Download Cilium CLI
      ansible.builtin.get_url:
        url: "https://github.com/cilium/cilium-cli/releases/download/v{{ cilium_version }}/cilium-linux-amd64.tar.gz"
        dest: /tmp/cilium-cli.tar.gz
        mode: "0644"

    - name: Create directory for Cilium CLI
      ansible.builtin.file:
        path: /tmp/cilium-cli
        state: directory
        mode: "0755"

    - name: Extract Cilium CLI
      ansible.builtin.unarchive:
        src: /tmp/cilium-cli.tar.gz
        dest: /tmp/cilium-cli
        remote_src: true

    - name: Move Cilium CLI binary to /usr/local/bin
      ansible.builtin.copy:
        src: /tmp/cilium-cli/cilium
        dest: /usr/local/bin/cilium
        mode: "0755"
        remote_src: true

    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: present
      loop:
        - /tmp/cilium-cli.tar.gz
        - /tmp/cilium-cli

    - name: Install Cilium
      ansible.builtin.command: cilium install --version {{ cilium_version }} --set bpf.tc.priority=2
      register: cilium_install
      changed_when: cilium_install.rc == 0

    - name: Wait for Cilium to be ready
      ansible.builtin.command: cilium status --wait
      register: cilium_status
      changed_when: false
      retries: 30
      delay: 10
      until: cilium_status.rc == 0
