services:
  nordlynx:
    image: ghcr.io/bubuntux/nordlynx:2025-04-01
    hostname: nordlynx
    container_name: nordlynx
    ports:
      - 8089:8089 # qbittorrent UI
    cap_add:
      - NET_ADMIN # required
      - SYS_MODULE # maybe
    environment:
      - PRIVATE_KEY=<enter wire guard private key> # required
      # - QUERY=filters\[servers_groups\]\[identifier\]=legacy_p2p
      - filters\[country_id\]=200
      - NET_LOCAL=192.168.0.0/16,172.17.0.0/16,10.244.0.0/16
      - TZ=Africa/Johannesburg
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1 # maybe
      - net.ipv4.conf.all.rp_filter=2 # maybe; set reverse path filter to loose mode
      - net.ipv6.conf.all.disable_ipv6=1 # disable ipv6; recommended if using ipv4 only
    restart: unless-stopped
  qbittorrent:
    image: linuxserver/qbittorrent:5.0.4
    network_mode: service:nordlynx
    container_name: qbittorrent-nord
    depends_on:
      - nordlynx
    environment:
      - WEBUI_PORT=8089
      - PUID=1000
      - PGID=0
      - TZ=Africa/Johannesburg
    volumes:
      - ./qbittorrent/config:/config
      - /opt/media/downloads:/downloads
    restart: unless-stopped
